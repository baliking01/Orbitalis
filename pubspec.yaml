name: orbitalis
description: Real-time space object tracking and launch monitoring platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.5
  dio: ^5.6.0
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.2.2
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  geolocator: ^13.0.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  lottie: ^3.1.0
  path_provider: ^2.1.3
  pretty_dio_logger: ^1.4.0
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  workmanager: ^0.5.2

dev_dependencies:
  build_runner: ^2.4.12
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
